<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="452b — the ceo operating system. state · signal · structure · sequence · language." />
    <title>452b — the operator's diagnostic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica:ital@0;1&family=IM+Fell+English+SC&family=VT323&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #f0e9d8;
        color: #1a1614;
        font-family: 'IM Fell DW Pica', 'Cormorant Garamond', Georgia, serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        overflow-x: hidden;
        background-image:
          radial-gradient(ellipse at top, rgba(0,0,0,0) 0%, rgba(60,40,20,0.05) 100%),
          repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(120,80,40,0.015) 2px, rgba(120,80,40,0.015) 3px);
      }
      ::selection { background: #1a1614; color: #f0e9d8; }
      a { color: inherit; }
      button { font-family: inherit; }

      /* PHOSPHOR TERMINAL MODE */
      .terminal {
        background: #0a0a0a;
        color: #33ff66;
        font-family: 'VT323', 'Space Mono', 'Courier New', monospace;
        text-shadow: 0 0 4px rgba(51, 255, 102, 0.5);
        position: relative;
      }
      .terminal-bg::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: repeating-linear-gradient(
          0deg,
          rgba(0,0,0,0) 0px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0.18) 2px,
          rgba(0,0,0,0.18) 3px
        );
        pointer-events: none;
        z-index: 1;
      }
      .terminal-bg::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
        pointer-events: none;
        z-index: 2;
      }
      .terminal-bg > * { position: relative; z-index: 3; }
      .terminal-amber {
        color: #ffb000;
        text-shadow: 0 0 4px rgba(255, 176, 0, 0.5);
      }

      /* CURSOR BLINK */
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor::after {
        content: "█";
        animation: blink 1s step-end infinite;
        margin-left: 2px;
      }
      .cursor-only {
        display: inline-block;
        animation: blink 1s step-end infinite;
      }

      /* HEADER ORNAMENT */
      .smallcaps {
        font-family: 'IM Fell English SC', serif;
        letter-spacing: 0.18em;
      }

      /* DOUBLE RULES */
      .double-rule {
        border-top: 1px solid #1a1614;
        border-bottom: 1px solid #1a1614;
        height: 5px;
        margin: 24px 0;
      }
      .triple-rule {
        border-top: 3px double #1a1614;
        height: 0;
        margin: 24px 0;
      }

      /* DROP CAP */
      .drop-cap::first-letter {
        font-family: 'IM Fell English SC', serif;
        font-size: 4.5em;
        float: left;
        line-height: 0.85;
        margin: 0.05em 0.08em 0 0;
        font-weight: 400;
      }

      /* ASCII LAYOUT */
      .ascii {
        font-family: 'VT323', 'Courier New', monospace;
        white-space: pre;
        line-height: 1;
      }

      /* TYPED EFFECT */
      @keyframes type-in {
        from { opacity: 0; transform: translateY(2px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .type-in { animation: type-in 0.05s ease-out; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
