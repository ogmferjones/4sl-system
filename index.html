<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="452b — the operator's diagnostic. state · signal · structure · sequence · language." />
    <title>452b</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=VT323&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body { overflow-x: hidden; }
      a { color: inherit; }
      button { font-family: inherit; }

      /* CRT scanlines (used in terminal mode) */
      .scanlines::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          rgba(0,0,0,0) 0px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0.18) 2px,
          rgba(0,0,0,0.18) 3px
        );
        pointer-events: none;
        z-index: 9999;
      }
      .crt-vignette::after {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
        pointer-events: none;
        z-index: 9998;
      }

      /* Cursor blink */
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .blink::after {
        content: "█";
        animation: blink 1s step-end infinite;
        margin-left: 2px;
      }
      .blink-only {
        display: inline-block;
        animation: blink 1s step-end infinite;
      }

      /* Drop cap (broadsheet) */
      .drop-cap-broadsheet::first-letter {
        font-family: 'Playfair Display', serif;
        font-size: 4.5em;
        float: left;
        line-height: 0.85;
        margin: 0.05em 0.08em 0 0;
        font-weight: 600;
      }

      /* Drop cap (editorial) */
      .drop-cap-editorial::first-letter {
        font-family: 'Fraunces', serif;
        font-size: 4em;
        float: left;
        line-height: 0.9;
        margin: 0.05em 0.08em 0 0;
        font-weight: 400;
        font-style: italic;
      }

      /* Selection colors set per theme via inline rules */
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
